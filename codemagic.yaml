workflows:
  ios-workflow:
    name: ZOD Manpower iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: 16
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Prebuild for simulator
        script: |
          npx expo prebuild --clean
      - name: Install pods
        script: |
          cd ios && pod install
      - name: Build for simulator
        script: |
          cd ios
          xcodebuild -workspace ZODManpower.xcworkspace \
            -scheme ZODManpower \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build
    artifacts:
      - ios/build/Build/Products/Debug-iphonesimulator/*.app