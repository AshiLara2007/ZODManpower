workflows:
  ios-workflow:
    name: ZOD Manpower iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: 16
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Prebuild for simulator
        script: |
          npx expo prebuild --clean
      - name: Install pods
        script: |
          cd ios && pod install
      - name: List all schemes (Debug)
        script: |
          cd ios
          echo "=== Available schemes ==="
          xcodebuild -workspace ZODManpower.xcworkspace -list
      - name: Build for simulator
        script: |
          cd ios
          # Get the actual scheme name from workspace
          SCHEME=$(xcodebuild -workspace ZODManpower.xcworkspace -list | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          echo "Using scheme: $SCHEME"
          xcodebuild -workspace ZODManpower.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build
    artifacts:
      - ios/build/Build/Products/Debug-iphonesimulator/*.app