workflows:
  ios-build:
    name: ZOD Manpower iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: 16
    scripts:
      - name: Install dependencies
        script: |
          npm install
      
      - name: Prebuild for iOS
        script: |
          npx expo prebuild --clean --non-interactive
      
      - name: Install pods
        script: |
          cd ios
          pod install --repo-update
      
      - name: Get actual scheme name
        script: |
          cd ios
          echo "=== Listing all schemes ==="
          xcodebuild -workspace ZODManpower.xcworkspace -list
          SCHEME=$(xcodebuild -workspace ZODManpower.xcworkspace -list | grep -A 1 "Schemes:" | tail -n 1 | tr -d ' ')
          echo "Detected scheme: $SCHEME"
          echo "$SCHEME" > scheme_name.txt
      
      - name: Build Debug Simulator
        script: |
          cd ios
          SCHEME=$(cat scheme_name.txt)
          echo "Building with scheme: $SCHEME"
          xcodebuild -workspace ZODManpower.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
    artifacts:
      - ios/build/Build/Products/Debug-iphonesimulator/*.app